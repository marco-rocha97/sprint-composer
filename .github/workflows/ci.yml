name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@11bd71901afe0b5e627e8d3e00d15d4e85ea5149

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@0b93645e9e0d20f5389568563bba3cfa8ee8f06d
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@b36abb75fbb6cbc3cda5e77a69e6835e7ec42ef5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Lint with ruff
        run: uv run ruff check src/ tests/

      - name: Format check with ruff
        run: uv run ruff format --check src/ tests/

      - name: Type check with mypy
        run: uv run mypy src/

      - name: Run tests
        run: uv run pytest tests/ -v
